<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }} – Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">{{ app_name }} – Profile</span>
    <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-4">
    <h4>User Profile</h4>

    <table class="table table-bordered w-50">
        <tr>
            <th>Username</th>
            <td>{{ user }}</td>
        </tr>
        <tr>
            <th>Role</th>
            <td>BESCOM Engineer</td>
        </tr>
        <tr>
            <th>Access Level</th>
            <td>Read‑only Analytics</td>
        </tr>
    </table>

    <div class="alert alert-info">
        Profile details are managed according to BESCOM internal IT policies.
    </div>
</div>

<footer class="text-center text-muted mt-5 mb-3">
    <small>{{ footer }} · Version {{ version }}</small>
</footer>

</body>
</html>

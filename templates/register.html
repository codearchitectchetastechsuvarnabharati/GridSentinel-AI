<!DOCTYPE html>
<html>
<head>
<head> <meta charset="UTF-8">
    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ✅ Animate CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <title>{{ app_name }} - Register</title>
</head>

<style>
body {
    background: linear-gradient(135deg,#6610f2,#0d6efd);
    height:100vh;
}

.card {
    border-radius:20px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card p-4 shadow-lg animate__animated animate__fadeInUp" style="width:350px">

<h3 class="text-center">📝 Register</h3>

<form method="POST">

<input type="email" name="username"
class="form-control mb-3"
placeholder="Enter BESCOM email"
required>

<button onclick="loading(this)" class="btn btn-success w-100">
Register
</button>

</form>

<p class="text-center">
<a href="/">Back to Login</a>
</p>

</div>

<script>
function loading(btn){
    btn.innerHTML="<span class='spinner-border spinner-border-sm'></span> Registering...";
}
</script>

</body>
</html>

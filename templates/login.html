<!DOCTYPE html>
<html lang="en">

<head> <meta charset="UTF-8">

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Animate CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">


    <title>{{ app_name }} - Login</title>
</head>

<style>
body {
    background: linear-gradient(135deg,#6610f2,#0d6efd);
    height:100vh;
}

.card {
    border-radius:20px;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}
</style>
<body class="bg-light">
<div class="card p-4 shadow-lg animate__animated animate__fadeInDown">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h4 class="text-center mb-2">{{ app_name }}</h4>
                <p class="text-muted text-center">{{ tagline }}</p>

                <form method="POST" class="mt-3">
                    <input
                        type="email"
                        name="username"
                        class="form-control mb-3"
                        placeholder="engineer@bescom.co.in"
                        required
                    >
                    <button onclick="loading(this)" class="btn btn-primary w-100">
                        Login
                    </button>
                </form>
                <p class="text-center mt-3">
                <a href="/register">New user? Register</a>
                </p>
                <p class="small text-muted text-center mt-3">
                    Authorized {{ org }} users only
                </p>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted mt-4">
    <small>{{ footer }} · Version {{ version }}</small>
</footer>

<script>
function loading(btn){
    btn.innerHTML = "<span class='spinner-border spinner-border-sm'></span> Logging...";
}
</script>
</body>
</html>

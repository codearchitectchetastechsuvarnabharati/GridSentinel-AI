<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Chart JS (IMPORTANT) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <title>{{ app_name }} - Charts</title>
</head>

<style>
body {
    background: linear-gradient(135deg,#6610f2,#0d6efd);
    height:100vh;
}

.card {
    border-radius: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

</style>

<body>
<nav class="navbar navbar-dark bg-dark px-3 shadow mb-3 animate__animated animate__fadeInDow">

    <span class="navbar-brand">⚡ GridSentinel AI</span>

    <div>
        <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">📊 Dashboard</a>
        <a href="/charts" class="btn btn-outline-light btn-sm me-2">📈 Charts</a>
        <a href="/profile" class="btn btn-outline-light btn-sm me-2">👤 Profile</a>

        <!-- ✅ ADMIN BUTTON FIX -->
        {% if session.get('role') == 'admin' %}
        <a href="/admin" class="btn btn-warning btn-sm me-2">⚙ Admin</a>
        {% endif %}

        <a href="/export" class="btn btn-success btn-sm me-2">📄 Export</a>
        <a href="/logout" class="btn btn-danger btn-sm">🚪 Logout</a>
    </div>

</nav>

<!-- ✅ CONTENT -->
<div class="container mt-4">

    <div class="card p-4 shadow animate__animated animate__fadeInUp">

        <h4 class="mb-3">Zone Forecast vs Peak</h4>

        <canvas id="zoneChart"></canvas>

    </div>

</div>
<body>
<div class="container mt-4">
    <canvas id="zoneChart"class="animate__animated animate__zoomIn"></canvas>
</div>
<script>
fetch("/api/chart-data")
.then(res => res.json())
.then(data => {

    console.log(data);   // ✅ ADD THIS (debug)

    const ctx = document.getElementById("zoneChart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: data.zones,
            datasets: [
                {
                    label: "Forecast Load",
                    data: data.forecast,
                    borderColor: "blue",
                    backgroundColor: "rgba(0,0,255,0.1)",
                    fill: true
                },
                {
                    label: "Peak Load",
                    data: data.peak,
                    borderColor: "orange",
                    backgroundColor: "rgba(255,165,0,0.1)",
                    fill: true
                }
            ]
        }
    });

})
.catch(err => {
    console.error("ERROR:", err);
});
</script>

<footer>
<footer class="text-center text-light mt-5 mb-3">
    GridSentinel AI · BESCOM Internal Use Only · Access Logged · Version 1.0.0
</footer>

</body>
</html>
